# ============================================
# SalesFlow CRM - Alembic Configuration
# ============================================
# Alembic is a database migration tool.
# It tracks changes to your database schema over time.
#
# Think of it like "Git for your database":
# - You change a model → Alembic generates a migration script
# - You run the migration → Database is updated
# - You can rollback → Database goes back to previous state

[alembic]
# Path to migration scripts
script_location = alembic

# Database connection string (loaded from .env via env.py)
# Leave empty here - it's set programmatically in env.py
sqlalchemy.url = 

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
